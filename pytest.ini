[pytest]
# 明烛测试配置
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -x
markers =
    slow: 标记为慢测试（需要 LLM API 调用）
    integration: 集成测试（需要完整环境）
    unit: 单元测试（纯逻辑，无外部依赖）
filterwarnings =
    ignore::DeprecationWarning
