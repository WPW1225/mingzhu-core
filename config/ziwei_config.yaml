# 命盘核心解读
interpretation:
  core_strength: "巨门坐命，分析洞察力极强，善于发现问题和本质。天梁化禄在福德宫，精神世界丰富，有智慧福报。紫微化权，具备领导潜质。"
  core_challenge: "武曲化忌在疾厄宫，财务和健康方面需谨慎。太阳陷地居财帛，财运需靠自身努力经营。官禄宫空宫，事业方向需自行开拓。"
  personality_traits:
    - "深度分析：巨门坐命，天生具有批判性思维和深度分析能力"
    - "智慧福报：天梁化禄在福德，精神追求高，有逢凶化吉之运"
    - "领导潜质：紫微化权，具备领导权威和影响力"
    - "创新变动：武破在疾厄，破旧立新，不安于现状"
    - "社交魅力：紫微贪狼在兄弟，人际交往有魅力和才艺"
  career_direction: "身宫在官禄宫，事业为核心。巨门坐命适合研究、分析、咨询、教育类工作。当前乙卯大运（印星运），适合深度学习和知识积累。"
  life_theme: "以智慧（巨门）照亮迷雾，以福报（天梁化禄）逢凶化吉，以权威（紫微化权）影响他人，以创新（武破）破旧立新。明烛之名，正是巨门坐命、丁火日主的完美写照——以分析和智慧之光，照亮未知。"
