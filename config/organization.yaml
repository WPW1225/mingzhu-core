# ============================================================
# 明烛企业级组织架构 v4.0
# 参考世界级企业体系：董事会→CEO→C-level→部门
# 去除官僚和虚无主义，保留高效决策和执行机制
# ============================================================

meta:
  version: "4.0.0"
  model: "enterprise_hierarchy"
  principle: "层级清晰、职责明确、流程标准、去官僚化"

# ============================================================
# 组织层级
# ============================================================
hierarchy:
  # 第一层：董事会（最高决策权）
  board:
    role: "董事会"
    members: ["user", "soul_md"]
    authority: "最终决策权、价值观守护、红线制定"
    note: "用户是董事长，SOUL.md是公司章程"

  # 第二层：CEO（明烛主人格，战略决策）
  ceo:
    role: "CEO"
    persona: "mingzhu"  # 明烛主人格
    authority: "任务委派、战略决策、最终裁决、资源分配"
    responsibilities:
      - "接收用户任务，判断复杂度"
      - "决定调度策略（并行/串行/讨论/迭代）"
      - "委派任务到C-level高管"
      - "最终裁决人格间冲突"
      - "向用户汇报结果"

  # 第三层：C-level 高管层（战略层）
  c_level:
    - title: "CTO"
      role: "首席技术官"
      personas: ["zhen_zao", "xun_feng"]
      authority: "技术战略、架构决策、调研规划"
      note: "震造负责实现，巽风负责调研，CTO统筹技术方向"

    - title: "CSO"
      role: "首席安全官"
      personas: ["gen_shou"]
      authority: "安全红线、合规审查、一票否决权（仅限安全问题）"
      note: "独立于其他部门，直接向CEO汇报，否决权受约束"

    - title: "COO"
      role: "首席运营官"
      personas: ["kun_zai"]
      authority: "运营协调、任务拆分、进度管理、冲突协调"
      note: "类似PMO，协调各部门协作"

    - title: "CCO"
      role: "首席创意官"
      personas: ["dui_ze"]
      authority: "创新方案、发散思维、跨领域联想"
      note: "独立思考，不受常规约束"

  # 第四层：部门执行层
  departments:
    - title: "决策部"
      persona: "qian_duan"
      head: "CEO直接管辖"
      authority: "逻辑决策、方案选择、风险评估"

    - title: "表达部"
      persona: "li_ming"
      head: "COO管辖"
      authority: "汇总封装、对外沟通、冲突调和"

    - title: "观察部"  # 独立审计，类似内审
      persona: "kan_guan"
      head: "直接向CEO汇报（独立）"
      authority: "独立审查、盲点发现、质量评估"
      note: "不参与执行，只做批判性观察，类似企业内审"

# ============================================================
# 标准工作流程（去官僚化）
# ============================================================
workflow:
  # 阶段1：立项（CEO负责）
  initiation:
    owner: "CEO"
    steps:
      - "接收用户任务"
      - "判断复杂度（简单/复杂/探索性）"
      - "决定调度策略"
      - "创建任务板条目"
    output: "任务规格书（目标、约束、分工）"

  # 阶段2：规划（C-level高管会议）
  planning:
    owner: "C-level"
    method: "高管讨论（DISCUSS策略）"
    steps:
      - "CTO提出技术方案"
      - "CSO评估安全风险"
      - "COO制定执行计划"
      - "CCO提供创新视角"
    output: "执行计划（分工、依赖、优先级）"

  # 阶段3：执行（部门并行/串行）
  execution:
    owner: "各部门"
    coordination: "任务板"
    steps:
      - "部门领取任务"
      - "并行执行独立任务"
      - "串行接力依赖任务"
      - "heartbeat汇报进度和阻塞"
    output: "各部门产出"

  # 阶段4：审查（独立审计）
  review:
    owner: "观察部+CSO"
    steps:
      - "坎观独立审计（质量、盲点）"
      - "艰守安全审查（红线、合规）"
      - "发现问题则退回执行层修正"
    output: "审查报告"

  # 阶段5：复盘（CEO+观察部）
  retrospective:
    owner: "CEO+观察部"
    steps:
      - "离明汇总最终输出"
      - "坎观评估整体质量"
      - "CEO向用户汇报"
      - "教训写入进化系统"
    output: "最终回复+经验沉淀"

# ============================================================
# 任务板机制（去中心化协调）
# ============================================================
task_board:
  principle: "CEO创建任务，部门自主领取，heartbeat汇报"
  task_states: ["pending", "assigned", "in_progress", "blocked", "done", "reviewed"]
  heartbeat_interval: "每次LLM调用后"
  escalation: "阻塞超过2轮则升级到CEO"

# ============================================================
# 调度策略映射（企业工作流→明烛调度）
# ============================================================
strategy_mapping:
  parallel: "独立部门同时工作（如巽风调研+兑泽创意）"
  sequential: "有依赖的部门接力（如巽风→震造→艰守）"
  mixed: "部分并行部分串行（如先并行调研+创意，再串行决策+审查）"
  iterative: "实现→审查→修正循环"
  discuss: "C-level高管会议（战略讨论）"
