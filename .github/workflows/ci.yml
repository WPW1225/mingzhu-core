name: 明烛测试套件

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12]

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml langgraph langchain-core fastapi uvicorn

      - name: 验证配置文件
        run: |
          python -c "
          import yaml, glob
          files = glob.glob('config/**/*.yaml', recursive=True)
          for f in files:
              with open(f) as fh:
                  yaml.safe_load(fh)
              print(f'OK: {f}')
          print(f'共验证 {len(files)} 个配置文件')
          "

      - name: 运行测试套件
        run: |
          python tests/run_all_tests.py

      - name: 上传测试结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            tests/test_results_*.json
            tests/test_summary.json

  security:
    name: 安全扫描
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装 bandit
        run: pip install bandit pyyaml

      - name: 运行安全扫描
        run: bandit -c bandit.yaml -r agent_system/ -f json -o bandit-report.json --skip B603,B404,B311,B108 || true

      - name: 安全扫描结果
        run: |
          echo "=== Bandit 安全扫描结果 ==="
          if [ -f bandit-report.json ]; then
            cat bandit-report.json | python -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              print(f'扫描文件数: {d.get(\"metrics\",{}).get(\"_totals\",{}).get(\"loc\",0)}')
              print(f'问题数: {len(d.get(\"results\",[]))}')
              for r in d.get('results',[])[:10]:
                  print(f'  [{r[\"issue_severity\"]}] {r[\"test_id\"]}: {r[\"filename\"]}:{r[\"line_number\"]} - {r[\"issue_text\"][:60]}')
          except Exception as e:
              print(f'解析报告失败: {e}')
          "
          else
            echo "bandit-report.json 未生成（可能 bandit 配置问题）"
          fi

      - name: 上传安全报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: bandit-report.json

  performance:
    name: 性能基准
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install pyyaml langgraph langchain-core fastapi uvicorn

      - name: 运行性能基准
        run: python tests/test_performance.py

      - name: 上传性能基准
        uses: actions/upload-artifact@v4
        with:
          name: perf-baseline
          path: tests/perf_baseline.json
